# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: rhcsa-tui

before:
  hooks:
    - go mod tidy

builds:
  - id: rhcsa-tui
    main: ./cmd/rhcsa-tui
    binary: rhcsa-tui
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: rhcsa-tui
    ids:
      - rhcsa-tui
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - rhcsa-tui.cmd

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  groups:
    - title: Bug Fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 0
    - title: Other Changes
      order: 999
  filters:
    exclude:
      - "^Merge pull request"
      - "^docs:"
      - "^test:"
      - "^ci:"
