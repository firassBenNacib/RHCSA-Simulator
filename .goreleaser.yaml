project_name: rhcsa-tui
version: 1
before:
  hooks:
    - go mod download
builds:
  - id: rhcsa-tui
    main: ./cmd/rhcsa-tui
    binary: rhcsa-tui
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
    targets:
      - windows_amd64
      - windows_arm64
      - linux_amd64
      - linux_arm64
      - darwin_amd64
      - darwin_arm64
archives:
  - id: default
    format_overrides:
      - goos: windows
        format: zip
    files:
      - src: "**/*"
        dest: rhcsa-tui/
        strip_parent: true
        except:
          - "**/*.go"
          - "go.mod"
          - "go.sum"
          - ".git/**"
          - ".github/**"
checksum:
  name: checksums.txt
  algorithm: sha256
snapshot:
  name_template: "{{ .Tag }}-next"
release:
  github:
    owner: "{{ .Env.GH_OWNER }}"
    name: "{{ .Env.GH_REPO }}"
  draft: true
  prerelease: auto
