name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - feature/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source:
    name: Source Checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Go module consistency
        shell: bash
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
          go mod verify

      - name: Go test
        shell: bash
        run: go test -coverprofile=coverage.out ./...

      - name: Upload Go coverage
        uses: actions/upload-artifact@v7
        with:
          name: go-coverage-${{ matrix.os }}
          path: coverage.out

      - name: Go vet
        shell: bash
        run: go vet ./...

      - name: Go lint
        if: matrix.os == 'ubuntu-latest'
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

      - name: Build TUI
        shell: bash
        run: go build ./cmd/rhcsa-tui

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dev dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Python syntax
        shell: bash
        run: python -m py_compile tools/scenarios/*.py tools/scenarios/rhcsa_scenarios/*.py tools/scenarios/tests/*.py

      - name: Python unit tests
        shell: bash
        run: python -m pytest tools/scenarios/tests/ -q -s

      - name: Python lint
        shell: bash
        run: python -m ruff check tools/scenarios/

      - name: Scenario audit
        shell: bash
        run: python tools/scenarios/audit_scenarios.py

      - name: Scenario replay audit
        shell: bash
        run: python tools/scenarios/verify_scenario_solutions.py --kind all --track all --audit-only

      - name: PowerShell parser validation
        shell: pwsh
        run: |
          $errors = $null
    $psFiles = @('RHCSA.ps1', 'install.ps1') + (Get-ChildItem -Path 'host/modules' -Include '*.psm1','*.psd1' -Recurse).FullName
    foreach ($file in $psFiles) {
      [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$null, [ref]$errors) | Out-Null
            if ($errors) {
              $errors | Format-List | Out-String | Write-Error
              exit 1
            }
          }

      - name: PowerShell ScriptAnalyzer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
          }
          $issues = @()
    $psFiles = @('RHCSA.ps1', 'install.ps1') + (Get-ChildItem -Path 'host/modules' -Include '*.psm1','*.psd1' -Recurse).FullName
    foreach ($file in $psFiles) {
      $issues += Invoke-ScriptAnalyzer -Path $file -Severity Error, Warning
          }
          if ($issues.Count -gt 0) {
            $issues | Format-Table -AutoSize | Out-String | Write-Error
            exit 1
          }

      - name: Vagrantfile syntax
        shell: bash
        run: |
          if command -v ruby >/dev/null 2>&1; then
            ruby -c Vagrantfile
          else
            echo "Ruby is not available on this runner; skipping Vagrantfile syntax check."
          fi

      - name: Whitespace check
        shell: bash
        run: git diff --check
