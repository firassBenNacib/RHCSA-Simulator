name: Release TUI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            label: linux-amd64
          - runner: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
            label: windows-amd64
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
            label: macos-amd64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
            label: macos-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"

      - name: Run Go tests
        run: go test ./...

      - name: Build TUI binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          output="dist/rhcsa-tui-${{ matrix.label }}${{ matrix.ext }}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "$output" ./cmd/rhcsa-tui
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "$(basename "$output")" > "$(basename "$output").sha256")
          else
            shasum -a 256 "$output" | sed "s# dist/# #" > "$output.sha256"
          fi
          ls -lah dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: rhcsa-tui-${{ matrix.label }}
          path: |
            dist/rhcsa-tui-${{ matrix.label }}${{ matrix.ext }}
            dist/rhcsa-tui-${{ matrix.label }}${{ matrix.ext }}.sha256

      - name: Attach binary to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/rhcsa-tui-${{ matrix.label }}${{ matrix.ext }}
            dist/rhcsa-tui-${{ matrix.label }}${{ matrix.ext }}.sha256
