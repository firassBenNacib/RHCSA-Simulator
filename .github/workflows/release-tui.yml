name: Release TUI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish artifacts for; leave empty for a snapshot build"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Run Go tests
        run: go test ./...

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

      - name: Build snapshot artifacts
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.tag == '' }}
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test Linux binary
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.tag == '' }}
        shell: bash
        run: |
          set -euo pipefail
          binary="$(find dist -path '*linux_amd64*/rhcsa-tui' -type f | head -n 1)"
          test -n "$binary"
          "$binary" --version

      - name: Upload snapshot artifacts
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.tag == '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rhcsa-tui-snapshot
          path: dist/**

      - name: Publish tagged release
        if: ${{ github.event_name == 'push' || inputs.tag != '' }}
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test published Linux binary
        if: ${{ github.event_name == 'push' || inputs.tag != '' }}
        shell: bash
        run: |
          set -euo pipefail
          binary="$(find dist -path '*linux_amd64*/rhcsa-tui' -type f | head -n 1)"
          test -n "$binary"
          "$binary" --version
