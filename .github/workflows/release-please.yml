name: Release Please

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "demo/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    name: Prepare release PR or tag
    runs-on: ubuntu-latest

    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          release-type: simple

      - name: Format release notes
        if: ${{ steps.release.outputs.release_created == 'true' && steps.release.outputs.tag_name != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api "repos/${REPOSITORY}/releases/generate-notes" \
            -f tag_name="${TAG_NAME}" \
            --jq '.body' > release-notes.md
          gh release edit "${TAG_NAME}" --repo "${REPOSITORY}" --notes-file release-notes.md

      - name: Build TUI release artifacts
        if: ${{ steps.release.outputs.release_created == 'true' && steps.release.outputs.tag_name != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run release-tui.yml --repo "${{ github.repository }}" --ref main -f tag="${{ steps.release.outputs.tag_name }}"
